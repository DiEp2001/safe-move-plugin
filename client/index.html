<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFE MOVE</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <div class="brand-dot"></div>
            <div class="brand-text">
              <div class="brand-name">SAFE MOVE</div>
              <div class="brand-sub">Illustrator Panel</div>
            </div>
          </div>

          <div id="statusBadge" class="status-badge ready">Ready</div>
        </div>

        <div class="hero-banner">
          <div class="hero-overlay">
            <div class="hero-title">Color Move Tool</div>
            <div class="hero-desc">
              Preview và move object sang Die Cut / Dimension theo rule màu.
            </div>
          </div>
        </div>
      </header>
      <section class="tool-card">
        <div class="tool-title">DIE CUT RULE</div>

        <div class="rule-block">
          <div class="field-group">
            <label class="field-label">Fill</label>
            <div class="cmyk-grid">
              <div class="cmyk-item">
                <span class="cmyk-label c">C</span>
                <input
                  id="dieFillC"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label m">M</span>
                <input
                  id="dieFillM"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label y">Y</span>
                <input
                  id="dieFillY"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label k">K</span>
                <input
                  id="dieFillK"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Stroke</label>
            <div class="cmyk-grid">
              <div class="cmyk-item">
                <span class="cmyk-label c">C</span>
                <input
                  id="dieStrokeC"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label m">M</span>
                <input
                  id="dieStrokeM"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label y">Y</span>
                <input
                  id="dieStrokeY"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label k">K</span>
                <input
                  id="dieStrokeK"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
            </div>
          </div>

          <div class="option-row">
            <label class="option-item">
              <input type="checkbox" id="dieSpot" />
              <span>Spot</span>
            </label>
            <label class="option-item">
              <input type="checkbox" id="diePantone" />
              <span>Pantone</span>
            </label>
            <label class="option-item">
              <input type="checkbox" id="showDieLayer" checked />
              <span>Show Layer</span>
            </label>
          </div>

          <div class="field-group">
            <label class="field-label">Exclude List</label>
            <textarea
              id="dieExclude"
              class="field-textarea"
              placeholder="Mỗi dòng một từ khóa"
            ></textarea>
          </div>
        </div>
      </section>

      <section class="tool-card">
        <div class="tool-title">DIMENSION RULE</div>

        <div class="rule-block">
          <div class="field-group">
            <label class="field-label">Fill</label>
            <div class="cmyk-grid">
              <div class="cmyk-item">
                <span class="cmyk-label c">C</span>
                <input
                  id="dimFillC"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label m">M</span>
                <input
                  id="dimFillM"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label y">Y</span>
                <input
                  id="dimFillY"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label k">K</span>
                <input
                  id="dimFillK"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Stroke</label>
            <div class="cmyk-grid">
              <div class="cmyk-item">
                <span class="cmyk-label c">C</span>
                <input
                  id="dimStrokeC"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label m">M</span>
                <input
                  id="dimStrokeM"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label y">Y</span>
                <input
                  id="dimStrokeY"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
              <div class="cmyk-item">
                <span class="cmyk-label k">K</span>
                <input
                  id="dimStrokeK"
                  class="cmyk-input"
                  type="number"
                  min="0"
                  max="100"
                  step="0.1"
                  placeholder="0"
                />
              </div>
            </div>
          </div>

          <div class="option-row">
            <label class="option-item">
              <input type="checkbox" id="dimSpot" />
              <span>Spot</span>
            </label>
            <label class="option-item">
              <input type="checkbox" id="dimPantone" />
              <span>Pantone</span>
            </label>
            <label class="option-item">
              <input type="checkbox" id="showDimLayer" checked />
              <span>Show Layer</span>
            </label>
          </div>

          <div class="field-group">
            <label class="field-label">Exclude List</label>
            <textarea
              id="dimExclude"
              class="field-textarea"
              placeholder="Mỗi dòng một từ khóa"
            ></textarea>
          </div>
        </div>
      </section>

      <section class="tool-card action-card">
        <div class="tool-title">ACTION</div>

        <div class="action-row triple">
          <button id="previewDieBtn" class="action-btn preview-btn">
            Preview Die
          </button>
          <button id="previewDimBtn" class="action-btn preview-btn alt">
            Preview Dim
          </button>
          <button id="moveBtn" class="action-btn move-btn">Move All</button>
        </div>

        <div class="action-row secondary">
          <button id="resetBtn" class="secondary-btn">Reset</button>
        </div>
      </section>

      <section class="tool-card result-card">
        <div class="result-header">
          <div class="tool-title">RESULT</div>
          <div id="resultMode" class="result-mode">Idle</div>
        </div>

        <div id="resultBox" class="result-box">
          <div class="result-line muted">Ready...</div>
        </div>
      </section>
    </div>

    <script src="./lib/CSInterface.js"></script>
    <script src="./hostBridge.js"></script>
    <script src="./version.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
